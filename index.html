<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
    <div>
        <label style="display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">Довжина кабелю</label>
        <div style="display: flex; gap: 0.4rem;">
            <button onclick="setCableLength(0.5)" style="flex: 1; padding: 0.6rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;" id="btn-len-05">0.5м</button>
            <button onclick="setCableLength(1)" style="flex: 1; padding: 0.6rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;" id="btn-len-1">1м</button>
            <button onclick="setCableLength(1.5)" style="flex: 1; padding: 0.6rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;" id="btn-len-15">1.5м</button>
        </div>
    </div>

    <div>
        <label style="display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">Тип клеми</label>
        <div style="display: flex; gap: 0.4rem;">
            <button onclick="setTerminal('Кільце (під гайку)')" style="flex: 1; padding: 0.6rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center;" id="btn-term-ring">
                <span style="font-size: 1.2rem;">⭕</span>
                <span style="font-size: 0.7rem;">Кільце</span>
            </button>
            <button onclick="setTerminal('Штифт (штирь)')" style="flex: 1; padding: 0.6rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center;" id="btn-term-pin">
                <span style="font-size: 1.2rem;">📍</span>
                <span style="font-size: 0.7rem;">Штифт</span>
            </button>
        </div>
    </div>
</div>
