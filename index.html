<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerBattery Configurator</title>
</head>
<body style="margin: 0; padding: 20px; background: #f4f7fa; font-family: sans-serif;">

<div style="max-width: 600px; margin: auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
  
  <div style="position: relative; height: 220px; background: url('https://raw.githubusercontent.com/mischka1410-glitch/power-battery-config/main/photo_2026-03-12_12-18-23.jpg') center/cover no-repeat; display: flex; align-items: flex-end;">
    <div style="width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; padding: 1.5rem 2rem; text-align: center;">
      <h1 style="font-size: 1.8rem; margin: 0; font-weight: 600;">PowerBattery LiFePO₄</h1>
      <p style="font-size: 0.9rem; margin: 5px 0 0; opacity: 0.9;">Збірки в нержавіючому корпусі з JK BMS</p>
    </div>
  </div>

  <div style="padding: 1.5rem 2rem;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
      <div>
        <label style="display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">Напруга</label>
        <div style="display: flex; gap: 0.4rem;">
          <button onclick="setVoltage(12)" style="flex: 1; padding: 0.7rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600;" id="btn-12v">12V</button>
          <button onclick="setVoltage(24)" style="flex: 1; padding: 0.7rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600;" id="btn-24v">24V</button>
        </div>
      </div>
      <div>
        <label style="display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">Ємність</label>
        <div style="display: flex; gap: 0.4rem;">
          <button onclick="setCapacity(280)" style="flex: 1; padding: 0.7rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600;" id="btn-280ah">280 А·год</button>
          <button onclick="setCapacity(314)" style="flex: 1; padding: 0.7rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600;" id="btn-314ah">314 А·год</button>
        </div>
      </div>
    </div>

    <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">Опція дисплея</label>
        <div style="display: flex; gap: 0.4rem;">
            <button onclick="setDisplay(true)" style="flex: 1; padding: 0.7rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600;" id="btn-disp-yes">З дисплеєм</button>
            <button onclick="setDisplay(false)" style="flex: 1; padding: 0.7rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600;" id="btn-disp-no">Без дисплея</button>
        </div>
    </div>

    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;">
      <div style="text-align: center; margin-bottom: 1.2rem;">
        <h2 id="product-title" style="font-size: 1.5rem; margin: 0; color: #0f172a; font-weight: 700;">24V 280Ah 7.16кВт</h2>
        <p id="product-status" style="margin: 0.3rem 0 0; color: #3b82f6; font-weight: 600; font-size: 0.85rem;">З вбудованим дисплеєм</p>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; background: white; padding: 1rem; border-radius: 10px; border: 1px solid #e2e8f0;">
        <div>
            <p style="font-size: 0.7rem; color: #64748b; margin: 0; text-transform: uppercase;">Енергія</p>
            <p id="spec-energy" style="font-size: 1rem; font-weight: 700; margin: 0; color: #1e293b;">7.16 кВт·год</p>
        </div>
        <div>
            <p style="font-size: 0.7rem; color: #64748b; margin: 0; text-transform: uppercase;">Вага</p>
            <p id="spec-weight" style="font-size: 1rem; font-weight: 700; margin: 0; color: #1e293b;">~56 кг</p>
        </div>
        <div style="grid-column: span 2;">
            <p style="font-size: 0.7rem; color: #64748b; margin: 0; text-transform: uppercase;">Габарити (ДхШхВ)</p>
            <p id="spec-dims" style="font-size: 1rem; font-weight: 700; margin: 0; color: #1e293b;">650 x 220 x 280 мм</p>
        </div>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
      <a href="https://t.me/MischkaCV" target="_blank" style="text-decoration: none;">
        <button style="width: 100%; padding: 0.9rem; background: #229ED9; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
          ✈️ Telegram
        </button>
      </a>

      <a href="viber://chat?number=%2B380995078362" style="text-decoration: none;">
        <button style="width: 100%; padding: 0.9rem; background: #7360f2; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
          💜 Viber
        </button>
      </a>

      <button onclick="copyToClipboard()" style="grid-column: span 2; padding: 0.9rem; background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: 600;">
        📋 Скопіювати замовлення для чату
      </button>
    </div>
  </div>
</div>

<div id="toast" style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 0.8rem 1.5rem; border-radius: 50px; font-size: 0.9rem; z-index: 1000; box-shadow: 0 10px 15px rgba(0,0,0,0.1);">
    Текст скопійовано!
</div>

<script>
let selectedVoltage = 24;
let selectedCapacity = 280;
let hasDisplay = true;

const batteries = {
  '24-280': { energy: '7.16 кВт·год', weight: '~53 кг', dims: '584 x 165 x 250 мм', title: '24V 280Ah 7.16кВт' },
  '24-314': { energy: '8.04 кВт·год', weight: '~54 кг', dims: '584 x 165 x 250 мм', title: '24V 314Ah 8.04кВт' },
  '12-280': { energy: '3.58 кВт·год', weight: '~27 кг', dims: '350 x 165 x 250 мм', title: '12V 280Ah 3.58кВт' },
  '12-314': { energy: '4.02 кВт·год', weight: '~28 кг', dims: '350 x 165 x 250 мм', title: '12V 314Ah 4.02кВт' }
};

function setVoltage(v) { selectedVoltage = v; updateUI(); }
function setCapacity(c) { selectedCapacity = c; updateUI(); }
function setDisplay(bool) { hasDisplay = bool; updateUI(); }

function updateUI() {
  // Напруга
  [12, 24].forEach(v => {
    const btn = document.getElementById(`btn-${v}v`);
    btn.style.border = v === selectedVoltage ? '2px solid #1e40af' : '1px solid #e2e8f0';
    btn.style.background = v === selectedVoltage ? '#eff6ff' : 'white';
    btn.style.color = v === selectedVoltage ? '#1e40af' : '#1e293b';
  });

  // Ємність
  [280, 314].forEach(c => {
    const btn = document.getElementById(`btn-${c}ah`);
    btn.style.border = c === selectedCapacity ? '2px solid #1e40af' : '1px solid #e2e8f0';
    btn.style.background = c === selectedCapacity ? '#eff6ff' : 'white';
    btn.style.color = c === selectedCapacity ? '#1e40af' : '#1e293b';
  });

  // Дисплей кнопки
  document.getElementById('btn-disp-yes').style.border = hasDisplay ? '2px solid #1e40af' : '1px solid #e2e8f0';
  document.getElementById('btn-disp-yes').style.background = hasDisplay ? '#eff6ff' : 'white';
  document.getElementById('btn-disp-no').style.border = !hasDisplay ? '2px solid #1e40af' : '1px solid #e2e8f0';
  document.getElementById('btn-disp-no').style.background = !hasDisplay ? '#eff6ff' : 'white';

  const data = batteries[`${selectedVoltage}-${selectedCapacity}`];
  document.getElementById('product-title').textContent = data.title;
  document.getElementById('product-status').textContent = hasDisplay ? 'З вбудованим дисплеєм' : 'Без дисплея (керування через додаток)';
  document.getElementById('product-status').style.color = hasDisplay ? '#3b82f6' : '#64748b';
  
  document.getElementById('spec-energy').textContent = data.energy;
  document.getElementById('spec-weight').textContent = data.weight;
  document.getElementById('spec-dims').textContent = data.dims;
}

function copyToClipboard() {
  const data = batteries[`${selectedVoltage}-${selectedCapacity}`];
  const displayInfo = hasDisplay ? "з дисплеєм" : "без дисплея";
  const text = `Вітаю! Мене цікавить: ${data.title}, ${displayInfo}. Енергія: ${data.energy}. Вага: ${data.weight}.`;
  
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);
  });
}

updateUI();
</script>

</body>
</html>
